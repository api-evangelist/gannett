description: Gannett Co., Inc. is a diversified media and digital marketing solutions company and the publisher of USA TODAY and a network of more than 200 local daily newspapers across the United States. Through its USA TODAY Network and LocaliQ digital marketing services, Gannett delivers news, information, and digital marketing technology to consumers and small-to-medium-sized businesses. Gannett does not currently publish a publicly accessible developer API portal with open documentation.
